# Development overrides — merged automatically by Docker Compose and Visual Studio.
# Enables hot-reload for the web frontend and exposes the DB port for tooling.
# Do NOT commit secrets here; use a .env file for sensitive values.
services:
  db:
    # Expose DB to the Windows host so tools like pgAdmin / DataGrip can connect.
    ports:
      - "5432:5432"

  web:
    build:
      context: Vakaros.Vkx.Web
      dockerfile: Dockerfile.dev
    # Mount source so Next.js picks up file changes without a Docker rebuild.
    volumes:
      - ./Vakaros.Vkx.Web:/app
      - web_node_modules:/app/node_modules
    environment:
      # Required for Next.js file-watching to work on Windows / WSL2 volume mounts.
      WATCHPACK_POLLING: "true"
      # Enable Node.js inspector so VS (or Chrome DevTools) can attach a debugger.
      NODE_OPTIONS: "--inspect=0.0.0.0:9229"
    ports:
      - "9229:9229"

volumes:
  # Preserves the node_modules built into the image so they are not shadowed
  # by the host bind-mount above.  Rebuild the image (docker compose build web)
  # whenever package.json dependencies change.
  web_node_modules:

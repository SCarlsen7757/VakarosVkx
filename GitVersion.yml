mode: ContinuousDelivery

branches:
  main:
    label: ""
    increment: Patch
    is-mainline: true
    regex: ^main$
  feature:
    mode: ManualDeployment
    label: "{BranchName}"
    increment: Inherit
    regex: "^features?[\\/-](?<BranchName>.+)"
  pull-request:
    mode: ContinuousDelivery
    label: "PullRequest{Number}"
    increment: Inherit
    track-merge-target: true
    regex: "^(pull-requests|pull|pr)[\\/-](?<Number>\\d*)"

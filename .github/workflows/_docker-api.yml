name: Docker — Build/Push API

on:
  workflow_call:
    inputs:
      push:
        description: Whether to push the image to the registry
        type: boolean
        required: true
      version:
        description: Image version tag (e.g. 1.2.3 or pr-42)
        type: string
        required: true

jobs:
  docker-api:
    name: Docker ${{ inputs.push && 'Build & Push' || 'Build' }} — API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: inputs.push
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Vakaros.Vkx.Api/Dockerfile
          push: ${{ inputs.push }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/vakaros-vkx-api:${{ inputs.version }}
            ${{ inputs.push && format('ghcr.io/{0}/vakaros-vkx-api:latest', github.repository_owner) || '' }}

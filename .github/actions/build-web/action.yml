name: Build Web
description: Installs dependencies and builds the Vakaros.Vkx.Web Next.js project.

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: npm
        cache-dependency-path: Vakaros.Vkx.Web/package-lock.json

    - name: Install dependencies
      shell: bash
      working-directory: Vakaros.Vkx.Web
      run: npm ci

    - name: Build
      shell: bash
      working-directory: Vakaros.Vkx.Web
      run: npm run build

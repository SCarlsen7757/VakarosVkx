name: Get GitVersion
description: Installs GitVersion and calculates the semantic version from the git history.

outputs:
  semVer:
    description: Full semantic version (e.g. 1.2.3 or 1.2.3-feature-xyz.1)
    value: ${{ steps.gitversion.outputs.semVer }}
  majorMinorPatch:
    description: Major.Minor.Patch version without pre-release label (e.g. 1.2.3)
    value: ${{ steps.gitversion.outputs.majorMinorPatch }}
  preReleaseLabel:
    description: Pre-release label if present (e.g. feature-xyz)
    value: ${{ steps.gitversion.outputs.preReleaseLabel }}

runs:
  using: composite
  steps:
    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v4
      with:
        versionSpec: "6.x"

    - name: Determine version
      id: gitversion
      uses: gittools/actions/gitversion/execute@v4

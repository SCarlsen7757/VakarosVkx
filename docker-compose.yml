services:
  db:
    image: timescale/timescaledb-ha:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: vakaros
      POSTGRES_PASSWORD: vakaros
      POSTGRES_DB: vakaros
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vakaros"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ${DOCKER_REGISTRY-}vakarosvkxapi
    build:
      context: .
      dockerfile: Vakaros.Vkx.Api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: >-
        Host=db;Port=5432;Database=vakaros;Username=vakaros;Password=vakaros
    ports:
      - "8080:8080"

volumes:
  pgdata:
